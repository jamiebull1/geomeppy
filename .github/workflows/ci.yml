name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e .[testing,lint]

      - name: Lint (black)
        if: matrix.python-version == '3.13'
        run: black --check geomeppy tests docs setup.py release.py

      - name: Lint (mypy)
        if: matrix.python-version == '3.13'
        run: mypy --ignore-missing-imports geomeppy

      - name: Run tests
        run: pytest --fixtures -v --cov-config .coveragerc --cov=geomeppy tests

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment:
      name: pypi
      url: https://pypi.org/p/geomeppy
    permissions:
      id-token: write  # required for PyPI trusted publishing (OIDC)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build package
        run: |
          pip install build
          python -m build

      # PyPI Trusted Publishing must be configured on PyPI for this to work.
      # See: https://docs.pypi.org/trusted-publishers/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
